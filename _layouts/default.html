<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title and page.title != 'Home' %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

    <!-- Dark Mode Init — must run before paint to prevent flash -->
    <script>
        (function () {
            var t = localStorage.getItem('theme');
            if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">

    <!-- Fonts: Inter (body + UI) + Fira Code (mono) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

    <!-- Highlight.js (code syntax) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script>document.addEventListener('DOMContentLoaded', function () { hljs.highlightAll(); });</script>

    <!-- MathJax 3 — renders $…$ and $$…$$ LaTeX -->
    <script>
    MathJax = {
        tex: {
            inlineMath:  [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']],
            processEscapes: true
        }
    };
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

    <!-- Fuse.js — client-side fuzzy search -->
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js"></script>
</head>
<body>
<div class="app-container">

    <!-- ── Navigation ──────────────────────────────────────── -->
    <header class="top-header">
        <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>

        <nav class="header-nav" aria-label="Main navigation">
            <a href="{{ '/' | relative_url }}"
               class="header-link{% if page.url == '/' %} active{% endif %}">Home</a>
            <a href="{{ '/posts' | relative_url }}"
               class="header-link{% if page.url == '/posts.html' or page.layout == 'post' %} active{% endif %}">Writing</a>
            <a href="{{ '/research' | relative_url }}"
               class="header-link{% if page.url == '/research.html' or page.category == 'research' %} active{% endif %}">Research</a>
        </nav>

        <div class="header-actions">
            {% if site.cv_url %}
            <a href="{{ site.cv_url }}" class="cv-link" target="_blank" rel="noopener noreferrer">CV ↗</a>
            {% endif %}
            <button id="search-trigger" class="search-trigger" aria-label="Open search">
                <span class="search-icon">⌕</span>
                <span class="search-text">Search</span>
                <kbd class="search-kbd">⌘K</kbd>
            </button>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
                <span class="sun-icon">☀</span>
                <span class="moon-icon">☾</span>
            </button>
        </div>
    </header>

    <!-- ── Content ─────────────────────────────────────────── -->
    <div class="layout-wrapper{% if page.layout == 'post' or page.toc %} has-toc{% endif %}">

        <main class="main-content" id="main-content">
            {{ content }}

            <footer class="site-footer">
                <p>&copy; {{ 'now' | date: '%Y' }} Nicolas Rault-Wang &mdash;
                   <a href="{{ '/license.html' | relative_url }}">MIT License</a></p>
                <p id="contact-footer"></p>
                <script>
                    (function () {
                        var e = "nraultwang", d = "berkeley.edu";
                        var p = document.getElementById('contact-footer');
                        var a = document.createElement('a');
                        a.href = 'mailto:' + e + '@' + d;
                        a.textContent = e + ' [at] ' + d;
                        p.appendChild(a);
                    })();
                </script>
            </footer>
        </main>

        {% if page.layout == 'post' or page.toc %}
        <aside class="sidebar-right" aria-label="Table of contents">
            <div class="toc-container">
                <span class="toc-heading">On this page</span>
                <nav id="toc" aria-label="Page sections"></nav>
            </div>
        </aside>
        {% endif %}

    </div>

</div><!-- .app-container -->

<!-- ── Search Modal ──────────────────────────────────────── -->
<div id="search-modal" class="search-modal" role="dialog" aria-modal="true" aria-label="Search">
    <div class="search-modal-content">
        <div class="search-modal-header">
            <span class="search-modal-icon" aria-hidden="true">⌕</span>
            <input type="text" id="search-input"
                   placeholder="Search posts and pages…"
                   autocomplete="off" spellcheck="false"
                   aria-label="Search query">
        </div>
        <ul id="results-container" role="listbox" aria-label="Search results"></ul>
        <div class="search-modal-footer" aria-hidden="true">
            <span><kbd>Esc</kbd> close</span>
            <span><kbd>↑↓</kbd> navigate</span>
            <span><kbd>↵</kbd> open</span>
        </div>
    </div>
</div>

<!-- ── Scripts ────────────────────────────────────────────── -->

<!-- ToC auto-generator -->
<script>
document.addEventListener('DOMContentLoaded', function () {
    var toc = document.getElementById('toc');
    if (!toc) return;

    var content = document.getElementById('main-content');
    if (!content) return;

    var headings = Array.from(content.querySelectorAll('h2, h3')).filter(function (h) {
        return !h.closest('.site-footer') && !h.closest('.post-header');
    });

    if (headings.length === 0) {
        var aside = document.querySelector('.sidebar-right');
        if (aside) aside.style.display = 'none';
        return;
    }

    var ul = document.createElement('ul');
    var currentH2ul = null;

    headings.forEach(function (h, i) {
        if (!h.id) {
            h.id = h.textContent.toLowerCase()
                      .replace(/[^a-z0-9]+/g, '-')
                      .replace(/(^-|-$)/g, '') || ('sec-' + i);
        }
        var li = document.createElement('li');
        var a  = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent;
        li.appendChild(a);

        if (h.tagName === 'H2') {
            ul.appendChild(li);
            currentH2ul = document.createElement('ul');
            li.appendChild(currentH2ul);
        } else {
            (currentH2ul || ul).appendChild(li);
        }
    });

    toc.appendChild(ul);
});
</script>

<!-- Dark mode toggle -->
<script>
document.addEventListener('DOMContentLoaded', function () {
    document.getElementById('theme-toggle').addEventListener('click', function () {
        var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
    });
});
</script>

<!-- Search -->
<script>
document.addEventListener('DOMContentLoaded', function () {
    var modal   = document.getElementById('search-modal');
    var input   = document.getElementById('search-input');
    var trigger = document.getElementById('search-trigger');
    var results = document.getElementById('results-container');
    var isOpen  = false;

    /* Keyboard hint: Cmd on Mac, Ctrl elsewhere */
    if (navigator.platform.indexOf('Mac') === -1) {
        var kbd = trigger.querySelector('.search-kbd');
        if (kbd) kbd.textContent = 'Ctrl K';
    }

    function openModal() {
        modal.classList.add('active');
        input.focus();
        isOpen = true;
        document.body.style.overflow = 'hidden';
    }
    function closeModal() {
        modal.classList.remove('active');
        input.value = '';
        results.innerHTML = '';
        isOpen = false;
        document.body.style.overflow = '';
    }

    trigger.addEventListener('click', openModal);
    modal.addEventListener('click', function (e) { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', function (e) {
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); isOpen ? closeModal() : openModal(); }
        if (e.key === 'Escape' && isOpen) closeModal();
    });

    fetch('{{ site.baseurl }}/search.json')
        .then(function (r) { return r.json(); })
        .then(function (data) {
            var fuse = new Fuse(data, {
                keys: ['title', 'content'],
                threshold: 0.4,
                ignoreLocation: true,
                minMatchCharLength: 3,
                includeScore: true,
                includeMatches: true
            });

            input.addEventListener('input', function () {
                var q = this.value;
                results.innerHTML = '';
                if (q.length < 2) return;

                var hits = fuse.search(q).slice(0, 8);
                if (hits.length === 0) {
                    var li = document.createElement('li');
                    li.style.padding = '14px 20px';
                    li.innerHTML = '<span class="no-results">No results found</span>';
                    results.appendChild(li);
                    return;
                }

                hits.forEach(function (r) {
                    var item = r.item;
                    var li   = document.createElement('li');
                    var a    = document.createElement('a');
                    a.href   = item.url;

                    var titleEl = document.createElement('div');
                    titleEl.className = 'search-result-title';
                    titleEl.textContent = item.title;
                    a.appendChild(titleEl);

                    /* Snippet extraction */
                    var snippet = '';
                    if (r.matches && r.matches.length) {
                        var m = r.matches.find(function (x) { return x.key === 'content'; }) || r.matches[0];
                        if (m && m.indices && m.indices.length) {
                            var s   = m.indices[0][0];
                            var txt = m.value || item[m.key] || '';
                            var start = Math.max(0, s - 40);
                            var end   = Math.min(txt.length, s + 80);
                            snippet   = txt.substring(start, end).trim();
                            if (start > 0)         snippet = '…' + snippet;
                            if (end < txt.length)  snippet += '…';
                        }
                    }
                    if (!snippet && item.content) snippet = item.content.substring(0, 120).trim() + '…';

                    if (snippet) {
                        var snipEl = document.createElement('div');
                        snipEl.className = 'search-result-snippet';
                        snipEl.textContent = snippet;
                        a.appendChild(snipEl);
                    }

                    li.appendChild(a);
                    results.appendChild(li);
                });
            });
        });
});
</script>

<!-- Code copy buttons + figure utilities (loaded from assets/js/figures.js) -->
<script src="{{ '/assets/js/figures.js' | relative_url }}"></script>

</body>
</html>
