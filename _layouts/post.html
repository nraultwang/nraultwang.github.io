---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%B %-d, %Y" }}
      </time>
    </p>
  </header>

  <div class="post-content" id="post-content">
    {{ content }}
  </div>
</article>

<div class="back-link" style="margin-top: 40px; border-top: 1px solid var(--border-color); padding-top: 20px;">
  <a href="{{ '/posts' | relative_url }}">&larr; Back to Writing</a>
</div>

<!-- Auto-generate Table of Contents -->
<script>
document.addEventListener("DOMContentLoaded", function() {
    const content = document.getElementById('post-content');
    const tocContainer = document.getElementById('toc');
    if (!content || !tocContainer) return;

    const headings = content.querySelectorAll('h2, h3');
    if (headings.length === 0) {
        // Hide right sidebar if no headings
        document.querySelector('.sidebar-right').style.display = 'none';
        return;
    }

    const ul = document.createElement('ul');
    let currentH2_ul = null;

    headings.forEach((heading, index) => {
        // Ensure the heading has an ID
        if (!heading.id) {
            heading.id = heading.textContent.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
            if (!heading.id) heading.id = 'heading-' + index;
        }

        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#' + heading.id;
        a.textContent = heading.textContent;
        li.appendChild(a);

        if (heading.tagName.toLowerCase() === 'h2') {
            ul.appendChild(li);
            currentH2_ul = document.createElement('ul');
            li.appendChild(currentH2_ul);
        } else if (heading.tagName.toLowerCase() === 'h3') {
            if (currentH2_ul) {
                currentH2_ul.appendChild(li);
            } else {
                ul.appendChild(li);
            }
        }
    });

    tocContainer.appendChild(ul);
});
</script>
